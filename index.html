<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Zanzibar">
  <title>Zanzibar</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0; padding: 0;
    }

    :root {
      --page-bg:     #060606;
      --body-bg:     #161616;
      --lcd-bg:      #B8C8AE;
      --lcd-bg2:     #A2B898;
      --lcd-border:  #6A7A62;
      --lcd-ink:     #0C1C0A;
      --lcd-ink2:    #1E3C1C;
      --lcd-dim:     #4A6448;
      --lcd-rate:    #6A8468;
      --btn-num-a:   #363636;
      --btn-num-b:   #060606;
      --btn-fn-a:    #1E2E1E;
      --btn-fn-b:    #04080A;
      --btn-or-a:    #F8A020;
      --btn-or-b:    #C05C06;
      --led-g:       #18A022;
      --led-r:       #C82020;
    }

    html, body {
      height: 100%;
      background: var(--page-bg);
      overflow: hidden;
    }

    body {
      font-family: -apple-system, 'Helvetica Neue', Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    /* ── Outer shell (centering only) ── */
    .shell {
      width: min(100vw, 370px);
      padding: max(env(safe-area-inset-top), 10px) 0 max(env(safe-area-inset-bottom), 10px);
    }

    /* ── Physical calculator body ── */
    .calc-body {
      position: relative;
      background: linear-gradient(175deg, #1C1C1C 0%, #141414 50%, #101010 100%);
      border-radius: 22px;
      padding: 22px 18px 28px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      /* Top face edge highlight */
      border-top: 1px solid rgba(255,255,255,0.08);
      border-left: 1px solid rgba(255,255,255,0.04);
      border-right: 1px solid rgba(0,0,0,0.6);
      border-bottom: 1px solid rgba(0,0,0,0.8);
      box-shadow:
        /* Close ambient */
        0 2px 4px   rgba(0,0,0,0.99),
        /* Near shadow */
        0 8px 18px  rgba(0,0,0,0.95),
        /* Mid shadow */
        0 22px 44px rgba(0,0,0,0.85),
        /* Far penumbra */
        0 50px 90px rgba(0,0,0,0.65),
        /* Massive ground shadow */
        0 90px 160px rgba(0,0,0,0.40),
        /* Inner surface ambient */
        inset 0 1px 0 rgba(255,255,255,0.07),
        inset 0 0 80px rgba(0,0,0,0.30);
    }

    /* Subtle bottom "thickness" edge — suggests device has physical depth */
    .calc-body::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 10px;
      right: 10px;
      height: 6px;
      background: linear-gradient(to bottom, #0A0A0A, transparent);
      border-radius: 0 0 22px 22px;
      filter: blur(4px);
      z-index: -1;
    }

    /* ── Brand row ── */
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }

    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
      font-style: italic;
    }

    .model {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: #383838;
    }

    /* ── LCD Display — recessed into body ── */
    .display-well {
      /* Outer sunken recess frame */
      background: #0C0C0C;
      border-radius: 6px;
      padding: 3px;
      box-shadow:
        inset 0 4px 10px rgba(0,0,0,0.9),
        inset 0 2px 4px  rgba(0,0,0,0.7),
        inset 2px 0 4px  rgba(0,0,0,0.4),
        inset -2px 0 4px rgba(0,0,0,0.4),
        inset 0 -1px 4px rgba(0,0,0,0.4),
        /* Top rim highlight (light catches front edge of recess) */
        0 -1px 0 rgba(255,255,255,0.06);
    }

    .display {
      background: linear-gradient(175deg, var(--lcd-bg) 0%, var(--lcd-bg2) 100%);
      border: 1px solid var(--lcd-border);
      border-radius: 4px;
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 0;
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.40),
        inset 0 1px 3px  rgba(0,0,0,0.25),
        inset 2px 0 6px  rgba(0,0,0,0.15),
        inset -2px 0 6px rgba(0,0,0,0.15);
    }

    .disp-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 5px 0;
    }

    .disp-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--lcd-dim);
    }

    .disp-val {
      font-size: 38px;
      font-weight: 100;
      letter-spacing: -0.01em;
      color: var(--lcd-ink);
      font-variant-numeric: tabular-nums;
      text-align: right;
      line-height: 1;
      transition: opacity 0.08s;
    }

    .disp-val.result {
      font-size: 26px;
      font-weight: 200;
      color: var(--lcd-ink2);
    }

    .disp-val.zero { opacity: 0.30; }

    .disp-sep {
      height: 1px;
      background: rgba(0,0,0,0.18);
      margin: 2px 0;
    }

    .disp-rate {
      font-size: 8.5px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--lcd-rate);
      text-align: right;
      padding-top: 7px;
    }

    /* ── LED indicators ── */
    .leds {
      display: flex;
      gap: 14px;
      padding: 0 3px;
    }

    .led-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .led-socket {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #0A0A0A;
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.9),
        inset 0 0 2px rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .led {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .led-g {
      background: radial-gradient(circle at 35% 35%, #4AE054, var(--led-g));
      box-shadow:
        0 0 6px  rgba(24,160,34,0.9),
        0 0 12px rgba(24,160,34,0.5),
        0 0 20px rgba(24,160,34,0.25);
    }

    .led-r {
      background: #2A0C0C;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
    }

    .led-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #1E1E1E;
    }

    .led-dot.active {
      background: var(--led-g);
      box-shadow: 0 0 3px rgba(24,160,34,0.8);
    }

    /* ── Keypad ── */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    /* ── Buttons — high-relief round domes ── */
    .btn {
      aspect-ratio: 1;
      border: none;
      border-radius: 50%;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      transition: transform 65ms ease, box-shadow 65ms ease, filter 65ms ease;
      -webkit-touch-callout: none;
    }

    /* Number dome — deep black sphere */
    .btn-n {
      background: radial-gradient(ellipse at 36% 28%,
        #3C3C3C 0%,
        #1E1E1E 35%,
        #060606 70%,
        #020202 100%);
      color: #CCCCCC;
      font-size: 22px;
      font-weight: 300;
      box-shadow:
        /* Socket ring */
        0 0 0 1.5px #020202,
        /* Direct drop shadow */
        0 5px 8px   rgba(0,0,0,1),
        0 10px 20px rgba(0,0,0,0.90),
        0 18px 36px rgba(0,0,0,0.70),
        /* Specular highlight top of dome */
        inset 0 4px 7px  rgba(255,255,255,0.16),
        inset 1px 2px 4px rgba(255,255,255,0.08),
        /* Dome depth (bottom half) */
        inset 0 -6px 14px rgba(0,0,0,0.80);
    }

    .btn-n:active {
      transform: scale(0.91) translateY(2px);
      filter: brightness(0.75);
      box-shadow:
        0 0 0 1.5px #020202,
        0 2px 4px   rgba(0,0,0,1),
        0 4px 8px   rgba(0,0,0,0.9),
        inset 0 2px 4px  rgba(255,255,255,0.08),
        inset 0 6px 14px rgba(0,0,0,0.85);
    }

    /* Function dome — dark green tint */
    .btn-f {
      background: radial-gradient(ellipse at 36% 28%,
        #243224 0%,
        #101810 38%,
        #040804 72%,
        #020402 100%);
      color: #9AB49A;
      font-size: 15px;
      font-weight: 500;
      box-shadow:
        0 0 0 1.5px #020402,
        0 5px 8px   rgba(0,0,0,1),
        0 10px 20px rgba(0,0,0,0.90),
        0 18px 36px rgba(0,0,0,0.70),
        inset 0 4px 7px  rgba(255,255,255,0.12),
        inset 1px 2px 4px rgba(255,255,255,0.05),
        inset 0 -6px 14px rgba(0,0,0,0.85);
    }

    .btn-f:active {
      transform: scale(0.91) translateY(2px);
      filter: brightness(0.75);
      box-shadow:
        0 0 0 1.5px #020402,
        0 2px 4px rgba(0,0,0,1),
        0 4px 8px rgba(0,0,0,0.9),
        inset 0 2px 4px  rgba(255,255,255,0.06),
        inset 0 6px 14px rgba(0,0,0,0.88);
    }

    /* Orange dome — warm glow */
    .btn-o {
      background: radial-gradient(ellipse at 36% 28%,
        #FFBA30 0%,
        #E88010 40%,
        #B05008 72%,
        #803006 100%);
      color: #FFF5E8;
      box-shadow:
        0 0 0 1.5px #5A1E02,
        0 5px 8px   rgba(0,0,0,1),
        0 10px 20px rgba(0,0,0,0.85),
        0 18px 36px rgba(0,0,0,0.65),
        /* Orange ambient glow */
        0 0 24px    rgba(220,110,10,0.35),
        0 0 48px    rgba(200,90,8,0.15),
        inset 0 4px 8px  rgba(255,230,120,0.35),
        inset 1px 2px 4px rgba(255,255,200,0.15),
        inset 0 -6px 14px rgba(0,0,0,0.60);
    }

    .btn-o:active {
      transform: scale(0.91) translateY(2px);
      filter: brightness(0.78);
      box-shadow:
        0 0 0 1.5px #5A1E02,
        0 2px 4px rgba(0,0,0,1),
        0 4px 8px rgba(0,0,0,0.9),
        0 0 12px rgba(220,110,10,0.25),
        inset 0 2px 4px  rgba(255,230,120,0.15),
        inset 0 6px 14px rgba(0,0,0,0.65);
    }

    /* Orange button inner layout */
    .swap-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      line-height: 1;
    }

    .swap-arrows { font-size: 18px; }
    .swap-text   { font-size: 7.5px; font-weight: 600; letter-spacing: 0.16em; opacity: 0.85; }

    /* Swap flash */
    @keyframes lcdFlash {
      0%   { opacity: 1; }
      25%  { opacity: 0.20; }
      100% { opacity: 1; }
    }
    .display.flash .disp-val {
      animation: lcdFlash 0.22s ease forwards;
    }
  </style>
</head>
<body>
  <div class="shell">
   <div class="calc-body">

    <div class="brand-row">
      <span class="brand">BrAun</span>
      <span class="model">ET 77 · TZS / EUR</span>
    </div>

    <div class="display-well">
      <div class="display" id="display">
        <div class="disp-row">
          <span class="disp-label" id="labelFrom">EUR</span>
          <span class="disp-val"   id="amtFrom">0</span>
        </div>
        <div class="disp-sep"></div>
        <div class="disp-row">
          <span class="disp-label" id="labelTo">TZS</span>
          <span class="disp-val result" id="amtTo">0</span>
        </div>
        <div class="disp-rate" id="rateInfo">Kurs wird geladen …</div>
      </div>
    </div>

    <div class="leds">
      <div class="led-unit">
        <div class="led-socket"><div class="led led-g"></div></div>
        <div class="led-dot active"></div>
      </div>
      <div class="led-unit">
        <div class="led-socket"><div class="led led-r"></div></div>
        <div class="led-dot"></div>
      </div>
    </div>

    <div class="keypad">
      <button class="btn btn-f"  ontouchstart="" onclick="press('C')">C</button>
      <button class="btn btn-f"  ontouchstart="" onclick="press('back')">⌫</button>
      <button class="btn btn-o"  ontouchstart="" onclick="swap()">
        <span class="swap-inner">
          <span class="swap-arrows">⇅</span>
          <span class="swap-text">TAUSCH</span>
        </span>
      </button>

      <button class="btn btn-n" ontouchstart="" onclick="press('7')">7</button>
      <button class="btn btn-n" ontouchstart="" onclick="press('8')">8</button>
      <button class="btn btn-n" ontouchstart="" onclick="press('9')">9</button>

      <button class="btn btn-n" ontouchstart="" onclick="press('4')">4</button>
      <button class="btn btn-n" ontouchstart="" onclick="press('5')">5</button>
      <button class="btn btn-n" ontouchstart="" onclick="press('6')">6</button>

      <button class="btn btn-n" ontouchstart="" onclick="press('1')">1</button>
      <button class="btn btn-n" ontouchstart="" onclick="press('2')">2</button>
      <button class="btn btn-n" ontouchstart="" onclick="press('3')">3</button>

      <button class="btn btn-n" ontouchstart="" onclick="press(',')">&#44;</button>
      <button class="btn btn-n" ontouchstart="" onclick="press('0')">0</button>
      <button class="btn btn-n" ontouchstart="" onclick="press('00')">00</button>
    </div>

   </div><!-- /.calc-body -->
  </div><!-- /.shell -->

  <script>
    let input = '';
    let mode  = 'EUR_TO_TZS';
    let rate  = 2760;
    let rateDate = '';

    (async () => {
      try {
        const r = await fetch('https://open.er-api.com/v6/latest/EUR', { cache: 'no-cache' });
        const d = await r.json();
        if (d.rates?.TZS) {
          rate = d.rates.TZS;
          const ts = d.time_last_update_utc;
          rateDate = ts
            ? new Date(ts).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'2-digit' })
            : '';
        }
      } catch (_) {}
      renderRate();
      render();
    })();

    function press(v) {
      if (v === 'C') {
        input = '';
      } else if (v === 'back') {
        input = input.slice(0, -1);
      } else if (v === ',') {
        if (input.includes(',')) return;
        input = input === '' ? '0,' : input + ',';
      } else if (v === '00') {
        if (input === '' || input === '0') return;
        const digits = input.replace(/[^0-9]/g, '');
        if (digits.length >= 11) return;
        input += '00';
      } else {
        if (input === '0') { input = v; }
        else {
          if (input.replace(/[^0-9]/g, '').length >= 12) return;
          input += v;
        }
      }
      render();
    }

    function swap() {
      mode  = mode === 'EUR_TO_TZS' ? 'TZS_TO_EUR' : 'EUR_TO_TZS';
      input = '';
      const d = document.getElementById('display');
      d.classList.add('flash');
      setTimeout(() => d.classList.remove('flash'), 250);
      render();
    }

    function parseNum() { return input ? parseFloat(input.replace(',', '.')) || 0 : 0; }

    function fmtInput(str) {
      if (!str) return '0';
      const parts = str.split(',');
      const intFmt = Number(parts[0] || '0').toLocaleString('de-DE', { maximumFractionDigits: 0 });
      return parts.length === 1 ? intFmt : intFmt + ',' + parts[1];
    }

    function fmtResult(val, isTZS) {
      if (!isFinite(val) || val === 0) return '0';
      return isTZS
        ? val.toLocaleString('de-DE', { maximumFractionDigits: 0 })
        : val.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function render() {
      const isEUR   = mode === 'EUR_TO_TZS';
      const amount  = parseNum();
      const result  = isEUR ? amount * rate : amount / rate;

      document.getElementById('labelFrom').textContent = isEUR ? 'EUR' : 'TZS';
      document.getElementById('labelTo'  ).textContent = isEUR ? 'TZS' : 'EUR';

      const fe = document.getElementById('amtFrom');
      const te = document.getElementById('amtTo');

      fe.textContent = fmtInput(input);
      fe.classList.toggle('zero', !input);

      // auto-shrink long input
      const len = (input || '0').length;
      fe.style.fontSize = len > 10 ? '24px' : len > 7 ? '30px' : '38px';

      te.textContent = fmtResult(result, isEUR);
      te.classList.toggle('zero', amount === 0);
    }

    function renderRate() {
      const el = document.getElementById('rateInfo');
      const r  = rate.toLocaleString('de-DE', { maximumFractionDigits: 0 });
      el.textContent = `1 EUR = ${r} TZS${rateDate ? '  ·  ' + rateDate : ''}`;
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') press(e.key);
      else if (e.key === ',' || e.key === '.') press(',');
      else if (e.key === 'Backspace') press('back');
      else if (e.key === 'Escape' || e.key.toLowerCase() === 'c') press('C');
      else if (e.key.toLowerCase() === 's') swap();
    });

    render();
    renderRate();
  </script>
</body>
</html>
